<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圖書館館藏查詢 — 德育護理健康學院</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <a href="index.html" class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      圖書館館藏
    </a>
    <a class="header-user" href="account.html" title="個人書房">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      <span>個人書房</span>
    </a>
  </header>

  <!-- Hero / Search -->
  <section class="hero">
    <h1>德育護理健康學院 圖書館</h1>
    <p>館藏查詢系統 — 適用手機、平板、電腦</p>

    <div class="search-box">
      <div class="search-row">
        <select id="searchField" aria-label="搜尋欄位">
          <option value="FullText">關鍵字</option>
          <option value="TI">書名</option>
          <option value="PN">作者</option>
          <option value="ISBN">ISBN</option>
          <option value="SU">主題</option>
          <option value="PU">出版社</option>
        </select>
        <input type="text" id="searchInput" placeholder="輸入關鍵字，例如：護理學、解剖學…" aria-label="搜尋關鍵字">
        <button class="btn-search" onclick="goSearch()">搜尋</button>
      </div>
      <p class="search-hint">可依書名、作者、ISBN 或主題進行查詢</p>
    </div>
  </section>

  <!-- 跑馬燈：推薦書單 -->
  <section class="carousel-section">
    <div class="carousel-header">
      <div class="carousel-tabs" id="carouselTabs"></div>
      <div class="carousel-nav">
        <button class="cnav" id="prevBtn" onclick="slide(-1)">‹</button>
        <button class="cnav" id="nextBtn" onclick="slide(1)">›</button>
      </div>
    </div>

    <div class="carousel-track-wrap">
      <div class="carousel-track" id="carouselTrack">
        <div class="carousel-loading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <p>德育護理健康學院圖書館 &copy; 2024 — 館藏資料來源：HyLib 系統</p>
  </footer>

  <script>
    // ── 搜尋 ──────────────────────────────────
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') goSearch();
    });

    function goSearch() {
      const q = document.getElementById('searchInput').value.trim();
      const field = document.getElementById('searchField').value;
      if (!q) { document.getElementById('searchInput').focus(); return; }
      window.location.href = `results.html?q=${encodeURIComponent(q)}&field=${field}`;
    }

    // ── 跑馬燈（動態讀取原網站首頁 TabbedPanels3 的分類，原網站改版本站自動跟著更新）──
    let categories = [];
    let currentCarousel = 0;
    let carouselOffset = 0;
    let carouselBooks = [];
    const CARD_WIDTH = 130; // px including gap
    let autoTimer = null;

    async function initCarousel() {
      const track = document.getElementById('carouselTrack');
      try {
        const res = await fetch('/api/booklist');
        const data = await res.json();
        categories = data.categories || [];
        if (!categories.length) {
          track.innerHTML = '<p style="padding:1rem;color:var(--text-muted)">暫無資料</p>';
          return;
        }
        renderTabs();
        switchCarousel(0);
      } catch (e) {
        track.innerHTML = '<p style="padding:1rem;color:var(--text-muted)">載入失敗</p>';
      }
    }

    function renderTabs() {
      document.getElementById('carouselTabs').innerHTML = categories.map((c, i) =>
        `<button class="ctab${i === 0 ? ' active' : ''}" onclick="switchCarousel(${i})">${esc(c.name)}</button>`
      ).join('');
    }

    function renderCarousel() {
      const track = document.getElementById('carouselTrack');
      if (!carouselBooks.length) {
        track.innerHTML = '<p style="padding:1rem;color:var(--text-muted)">暫無資料</p>';
        return;
      }
      track.innerHTML = carouselBooks.map(book => {
        const isEbook = book.type === 'ebook';
        const href = isEbook
          ? (book.ebookUrl || `https://collections.dyhu.edu.tw/bookDetail.do?id=${book.marcid}`)
          : `detail.html?marcid=${encodeURIComponent(book.marcid)}`;
        const target = isEbook ? ' target="_blank" rel="noopener"' : '';
        return `<a class="cbook" href="${esc(href)}"${target}>
          <div class="cbook-cover">
            ${book.cover
              ? `<img src="${esc(book.cover)}" alt="${esc(book.title)}" loading="lazy" onerror="this.parentElement.innerHTML='📚'">`
              : '<span>📚</span>'}
          </div>
          <div class="cbook-title">${esc(book.title)}</div>
        </a>`;
      }).join('');
      applyOffset();
    }

    function applyOffset() {
      document.getElementById('carouselTrack').style.transform = `translateX(-${carouselOffset}px)`;
    }

    function slide(dir) {
      const track = document.getElementById('carouselTrack');
      const maxOffset = Math.max(0, carouselBooks.length * CARD_WIDTH - track.parentElement.offsetWidth);
      carouselOffset = Math.max(0, Math.min(maxOffset, carouselOffset + dir * CARD_WIDTH * 3));
      applyOffset();
    }

    function startAutoSlide() {
      clearInterval(autoTimer);
      autoTimer = setInterval(() => {
        const track = document.getElementById('carouselTrack');
        const maxOffset = Math.max(0, carouselBooks.length * CARD_WIDTH - track.parentElement.offsetWidth);
        if (carouselOffset >= maxOffset) carouselOffset = 0;
        else carouselOffset = Math.min(maxOffset, carouselOffset + CARD_WIDTH * 3);
        applyOffset();
      }, 4000);
    }

    function switchCarousel(idx) {
      currentCarousel = idx;
      document.querySelectorAll('.ctab').forEach((b, i) => b.classList.toggle('active', i === idx));
      clearInterval(autoTimer);
      carouselOffset = 0;
      carouselBooks = (categories[idx] && categories[idx].books) || [];
      renderCarousel();
      startAutoSlide();
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // 初始載入
    initCarousel();
  </script>

</body>
</html>
