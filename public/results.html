<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>搜尋結果 — 圖書館館藏查詢</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header with inline search -->
  <header class="site-header">
    <a href="index.html" class="logo" title="回首頁">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
    </a>
    <div class="header-search">
      <select id="headerField" aria-label="搜尋欄位">
        <option value="FullText">關鍵字</option>
        <option value="TI">書名</option>
        <option value="PN">作者</option>
        <option value="ISBN">ISBN</option>
        <option value="SU">主題</option>
        <option value="PU">出版社</option>
      </select>
      <input type="text" id="headerInput" placeholder="再次搜尋…" aria-label="搜尋關鍵字">
      <button onclick="goSearch()">搜尋</button>
    </div>
  </header>

  <main class="container">
    <div id="typeTabs" class="type-tabs"></div>
    <div class="results-header">
      <p class="results-count" id="resultsCount">搜尋中…</p>
    </div>

    <div id="bookGrid" class="book-grid">
      <div class="loading">
        <div class="spinner"></div>
        <p>正在查詢館藏資料…</p>
      </div>
    </div>

    <div class="pagination" id="pagination"></div>
  </main>

  <footer class="site-footer">
    <p>德育護理健康學院圖書館 — 館藏資料來源：HyLib 系統</p>
  </footer>

  <script src="js/results.js"></script>
</body>
</html>
